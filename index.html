    // ============ 3D CHAIR COMPONENT ============
    function Chair3D() {
      const canvasRef = useRef(null);
      const sceneRef = useRef(null);
      
      useEffect(() => {
        if (!canvasRef.current) return;
        
        // Scene setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        canvasRef.current.appendChild(renderer.domElement);
        
        sceneRef.current = { scene, camera, renderer };
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
        scene.add(ambientLight);
        
        const spotLight = new THREE.SpotLight(0xffffff, 1);
        spotLight.position.set(10, 10, 10);
        scene.add(spotLight);
        
        const cyanLight = new THREE.PointLight(0x00f0ff, 0.8);
        cyanLight.position.set(-5, 5, -5);
        scene.add(cyanLight);
        
        const magentaLight = new THREE.PointLight(0xff00ff, 0.5);
        magentaLight.position.set(5, -5, 5);
        scene.add(magentaLight);
        
        // Materials
        const darkMaterial = new THREE.MeshStandardMaterial({ 
          color: 0x1a1a2e, 
          metalness: 0.8, 
          roughness: 0.2 
        });
        
        const cushionMaterial = new THREE.MeshStandardMaterial({ 
          color: 0x2d2d44, 
          metalness: 0.3, 
          roughness: 0.7 
        });
        
        const neonCyanMaterial = new THREE.MeshStandardMaterial({ 
          color: 0x00f0ff, 
          emissive: 0x00f0ff, 
          emissiveIntensity: 2 
        });
        
        const neonMagentaMaterial = new THREE.MeshStandardMaterial({ 
          color: 0xff00ff, 
          emissive: 0xff00ff, 
          emissiveIntensity: 2 
        });
        
        // Chair group
        const chairGroup = new THREE.Group();
        
        // Main seat
        const seatGeo = new THREE.BoxGeometry(1.5, 0.3, 1.2);
        const seat = new THREE.Mesh(seatGeo, darkMaterial);
        seat.position.y = 0.8;
        chairGroup.add(seat);
        
        // Seat cushion
        const cushionGeo = new THREE.BoxGeometry(1.3, 0.15, 1);
        const cushion = new THREE.Mesh(cushionGeo, cushionMaterial);
        cushion.position.y = 1;
        chairGroup.add(cushion);
        
        // Back rest
        const backGeo = new THREE.BoxGeometry(1.4, 1.4, 0.2);
        const back = new THREE.Mesh(backGeo, darkMaterial);
        back.position.set(0, 1.6, -0.4);
        back.rotation.x = -0.15;
        chairGroup.add(back);
        
        // Headrest
        const headGeo = new THREE.BoxGeometry(0.8, 0.5, 0.2);
        const head = new THREE.Mesh(headGeo, cushionMaterial);
        head.position.set(0, 2.4, -0.3);
        head.rotation.x = -0.2;
        chairGroup.add(head);
        
        // Armrests
        const armGeo = new THREE.BoxGeometry(0.15, 0.5, 0.8);
        const leftArm = new THREE.Mesh(armGeo, darkMaterial);
        leftArm.position.set(-0.85, 1.1, 0);
        chairGroup.add(leftArm);
        
        const rightArm = new THREE.Mesh(armGeo, darkMaterial);
        rightArm.position.set(0.85, 1.1, 0);
        chairGroup.add(rightArm);
        
        // Base
        const baseGeo = new THREE.CylinderGeometry(0.4, 0.5, 0.4, 32);
        const base = new THREE.Mesh(baseGeo, darkMaterial);
        base.position.y = 0.2;
        chairGroup.add(base);
        
        // Base ring (glowing)
        const ringGeo = new THREE.TorusGeometry(0.5, 0.03, 16, 100);
        const ring = new THREE.Mesh(ringGeo, neonCyanMaterial);
        ring.position.y = 0.05;
        ring.rotation.x = Math.PI / 2;
        chairGroup.add(ring);
        
        // PC Unit
        const pcGeo = new THREE.BoxGeometry(1.2, 0.8, 0.15);
        const pc = new THREE.Mesh(pcGeo, new THREE.MeshStandardMaterial({ color: 0x0a0a15, metalness: 0.95, roughness: 0.05 }));
        pc.position.set(0, 1.3, -0.5);
        chairGroup.add(pc);
        
        // Screen on PC
        const screenGeo = new THREE.PlaneGeometry(1, 0.5);
        const screenMat = new THREE.MeshStandardMaterial({ color: 0x001a1a, emissive: 0x00f0ff, emissiveIntensity: 0.5 });
        const screen = new THREE.Mesh(screenGeo, screenMat);
        screen.position.set(0, 1.35, -0.41);
        chairGroup.add(screen);
        
        // Massage nodes (left)
        const nodeGeo = new THREE.SphereGeometry(0.08, 16, 16);
        [-0.5, -0.3, -0.1].forEach((y, i) => {
          const node = new THREE.Mesh(nodeGeo, neonMagentaMaterial);
          node.position.set(-0.5, 1.2 + y, -0.25);
          chairGroup.add(node);
        });
        
        // Massage nodes (right)
        [-0.5, -0.3, -0.1].forEach((y, i) => {
          const node = new THREE.Mesh(nodeGeo, neonCyanMaterial);
          node.position.set(0.5, 1.2 + y, -0.25);
          chairGroup.add(node);
        });
        
        // Neon strips
        const stripGeo = new THREE.BoxGeometry(1.4, 0.02, 0.02);
        const cyanStrip = new THREE.Mesh(stripGeo, neonCyanMaterial);
        cyanStrip.position.set(0, 0.95, 0.6);
        chairGroup.add(cyanStrip);
        
        const magentaStrip = new THREE.Mesh(stripGeo, neonMagentaMaterial);
        magentaStrip.position.set(0, 0.95, -0.6);
        chairGroup.add(magentaStrip);
        
        scene.add(chairGroup);
        
        // Camera position
        camera.position.set(3, 2, 5);
        camera.lookAt(0, 1, 0);
        
        // Mouse interaction
        let mouseX = 0, mouseY = 0;
        const handleMouseMove = (e) => {
          mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
          mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
        };
        document.addEventListener('mousemove', handleMouseMove);
        
        // Animation
        let time = 0;
        const animate = () => {
          requestAnimationFrame(animate);
          time += 0.01;
          
          chairGroup.rotation.y += 0.003;
          chairGroup.position.y = Math.sin(time) * 0.1;
          
          chairGroup.rotation.x = mouseY * 0.1;
          chairGroup.rotation.z = mouseX * 0.05;
          
          renderer.render(scene, camera);
        };
        animate();
        
        // Resize handler
        const handleResize = () => {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
        };
        window.addEventListener('resize', handleResize);
        
        return () => {
          document.removeEventListener('mousemove', handleMouseMove);
          window.removeEventListener('resize', handleResize);
          renderer.dispose();
          if (canvasRef.current) {
            canvasRef.current.removeChild(renderer.domElement);
          }
        };
      }, []);
      
      return <div ref={canvasRef} id="three-canvas" />;
    }
